<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mohith P Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #555;
    }

    nav a {
      color: white;
      padding: 10px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background: #000;
    }

    section {
      padding: 20px;
      margin: 10px;
      background: white;
      border-radius: 10px;
    }

    .projects div {
      background: #eee;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>Mohith P</h1>
  <p>Beginner Web Developer</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About Me</h2>
  <p>Hello! I am Mohith, learning HTML, CSS, and JavaScript. I enjoy building simple websites.</p>
</section>

<section id="projects" class="projects">
  <h2>My Projects</h2>
  <div>Project 1: Portfolio Website</div>
  <div>Project 2: Simple Calculator</div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: example@email.com</p>
  <button onclick="showMessage()">Click Me</button>
</section>

<footer>
  <p>© 2026 Mohith P</p>
</footer>

<script>
  function showMessage() {
    alert("Thanks for visiting my portfolio!");
  }
</script>

</body>
</html>
